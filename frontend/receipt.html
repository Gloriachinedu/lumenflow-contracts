<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Receipt – LumenFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .receipt {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      max-width: 560px;
      width: min(100%, 560px);
      padding: 2rem;
      overflow-wrap: anywhere;
    }

    .receipt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e8ecf0;
      padding-bottom: 1rem;
    }

    .receipt-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #6c47ff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
    }

    .badge-completed { background: #e6f9f0; color: #1a9e5c; }
    .badge-refunded  { background: #fff3e0; color: #e07b00; }
    .badge-partial   { background: #fff8e1; color: #c68000; }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #6c47ff;
      font-weight: 600;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.2rem;
    }
    .field .value {
      font-size: 0.95rem;
      font-weight: 500;
      word-break: break-all;
    }
    .field .value.amount {
      font-size: 1.4rem;
      font-weight: 700;
      color: #6c47ff;
    }

    .divider {
      border: none;
      border-top: 1px dashed #e0e0e0;
      margin: 1.25rem 0;
    }

    .refunds-section h2 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .refund-item {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .refund-item .refund-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .refund-item .refund-reason { color: #666; font-size: 0.8rem; }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1 1 140px;
      min-height: 44px;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6c47ff; color: #fff; }
    .btn-outline { background: #fff; color: #6c47ff; border: 1.5px solid #6c47ff; }

    /* 404 / loading states */
    .state-box {
      text-align: center;
      padding: 3rem 1rem;
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-box h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .state-box p  { color: #666; font-size: 0.9rem; }

    #loading, #not-found, #receipt-content { display: none; }

    /* Print */
    @media print {
      body { background: #fff; padding: 0; }
      .receipt { box-shadow: none; border-radius: 0; max-width: 100%; }
      .actions { display: none; }
      .receipt-header h1::after { content: " – LumenFlow"; }
    }
  </style>
</head>
<body>

<div class="receipt">
  <!-- Loading -->
  <div id="loading" class="state-box">
    <div class="icon">⏳</div>
    <h2>Loading receipt…</h2>
  </div>

  <!-- 404 -->
  <div id="not-found" class="state-box">
    <div class="icon">🔍</div>
    <h2>Receipt not found</h2>
    <p>No payment record exists for order ID <strong id="missing-id"></strong>.</p>
  </div>

  <!-- Receipt content -->
  <div id="receipt-content">
    <div class="receipt-header">
      <h1>Payment Receipt</h1>
      <span id="status-badge" class="badge"></span>
    </div>

    <div class="field">
      <label>Order ID</label>
      <div class="value" id="field-order-id"></div>
    </div>

    <div class="field">
      <label>Merchant</label>
      <div class="value">
        <span id="field-merchant-name"></span>
        <span id="verified-badge" class="verified-badge" style="display:none">
          ✔ Verified
        </span>
      </div>
    </div>

    <div class="field">
      <label>Amount</label>
      <div class="value amount" id="field-amount"></div>
    </div>

    <div class="field">
      <label>Token</label>
      <div class="value" id="field-token"></div>
    </div>

    <div class="field">
      <label>Date</label>
      <div class="value" id="field-date"></div>
    </div>

    <hr class="divider" />

    <!-- Refund history (hidden when empty) -->
    <div id="refunds-section" class="refunds-section" style="display:none">
      <h2>Refund History</h2>
      <div id="refunds-list"></div>
      <hr class="divider" />
    </div>

    <div class="actions">
      <button class="btn btn-outline" onclick="window.print()">🖨 Print</button>
      <button class="btn btn-primary" onclick="copyLink()">🔗 Copy Link</button>
    </div>
  </div>
</div>

<script>
  // ── Routing ────────────────────────────────────────────────────────────────
  // Supports both:
  //   /receipt/ORDER_001          (path-based, requires server routing)
  //   /receipt.html?orderId=ORDER_001  (query-param fallback)

  function getOrderId() {
    const path = window.location.pathname;
    const match = path.match(/\/receipt\/([^/?#]+)/);
    if (match) return decodeURIComponent(match[1]);
    return new URLSearchParams(window.location.search).get('orderId');
  }

  // ── Formatting helpers ─────────────────────────────────────────────────────

  function formatAmount(amount, decimals = 7) {
    return (Number(amount) / Math.pow(10, decimals)).toLocaleString(undefined, {
      minimumFractionDigits: 2,
      maximumFractionDigits: decimals,
    });
  }

  function formatDate(timestamp) {
    return new Date(Number(timestamp) * 1000).toLocaleString();
  }

  function statusBadge(status) {
    const map = {
      Completed:         { label: '✔ Completed',          cls: 'badge-completed' },
      PartiallyRefunded: { label: '↩ Partially Refunded', cls: 'badge-partial'   },
      FullyRefunded:     { label: '↩ Fully Refunded',     cls: 'badge-refunded'  },
    };
    return map[status] || { label: status, cls: '' };
  }

  // ── Stellar / Soroban data fetching ────────────────────────────────────────
  // Replace CONTRACT_ID and NETWORK_RPC with your deployment values,
  // or inject them via a build-time environment variable.

  const CONTRACT_ID = window.LUMENFLOW_CONTRACT_ID || '';
  const RPC_URL     = window.LUMENFLOW_RPC_URL     || 'https://soroban-testnet.stellar.org';

  async function fetchPayment(orderId) {
    // If no contract configured, fall back to demo data so the page is usable
    // in a static preview without a live contract.
    if (!CONTRACT_ID) return getDemoData(orderId);

    const { SorobanRpc, Contract, nativeToScVal, scValToNative, Networks } =
      await import('https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@12/+esm');

    const server   = new SorobanRpc.Server(RPC_URL);
    const contract = new Contract(CONTRACT_ID);

    // get_payment_by_id requires a caller address; use a well-known testnet address
    // for read-only calls (no auth needed for view functions in practice).
    const callerArg = nativeToScVal('GAAZI4TCR3TY5OJHCTJC2A4QSY6CJWJH5IAJTGKIN2ER7LBNVKOCCWN', { type: 'address' });
    const idArg     = nativeToScVal(orderId, { type: 'string' });

    try {
      const result = await server.simulateTransaction(
        contract.call('get_payment_by_id', callerArg, idArg)
      );
      if (SorobanRpc.Api.isSimulationError(result)) return null;
      const payment = scValToNative(result.result.retval);

      // Fetch merchant name
      const merchantArg = nativeToScVal(payment.merchant_address, { type: 'address' });
      const mResult = await server.simulateTransaction(
        contract.call('get_merchant', merchantArg)
      );
      const merchant = SorobanRpc.Api.isSimulationError(mResult)
        ? { name: payment.merchant_address, verified: false }
        : scValToNative(mResult.result.retval);

      return { payment, merchant, refunds: [] };
    } catch {
      return null;
    }
  }

  function getDemoData(orderId) {
    if (orderId === 'NOT_FOUND') return null;
    return {
      payment: {
        order_id:         orderId,
        merchant_address: 'GBXGQJWVLWOYHFLVTKWV5FGHA3LNYY2JQKM7OAJAUEQFU6LPCSEFVXON',
        payer:            'GAAZI4TCR3TY5OJHCTJC2A4QSY6CJWJH5IAJTGKIN2ER7LBNVKOCCWN',
        token:            'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC',
        amount:           50000000n,
        status:           'Completed',
        paid_at:          BigInt(Math.floor(Date.now() / 1000) - 3600),
        refunded_amount:  0n,
        memo:             'Invoice #001',
      },
      merchant: { name: 'Demo Store', verified: true },
      refunds:  [],
    };
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function renderReceipt({ payment, merchant, refunds }) {
    document.getElementById('field-order-id').textContent    = payment.order_id;
    document.getElementById('field-merchant-name').textContent = merchant.name || payment.merchant_address;
    document.getElementById('field-amount').textContent      = formatAmount(payment.amount) + ' XLM';
    document.getElementById('field-token').textContent       = payment.token;
    document.getElementById('field-date').textContent        = formatDate(payment.paid_at);

    if (merchant.verified) {
      document.getElementById('verified-badge').style.display = 'inline-flex';
    }

    const { label, cls } = statusBadge(payment.status);
    const badge = document.getElementById('status-badge');
    badge.textContent = label;
    badge.className   = 'badge ' + cls;

    if (refunds && refunds.length > 0) {
      const list = document.getElementById('refunds-list');
      refunds.forEach(r => {
        const item = document.createElement('div');
        item.className = 'refund-item';
        item.innerHTML = `
          <div class="refund-row">
            <span><strong>${r.refund_id}</strong></span>
            <span>${formatAmount(r.amount)} XLM</span>
          </div>
          <div class="refund-row">
            <span class="refund-reason">${r.reason}</span>
            <span>${r.status}</span>
          </div>`;
        list.appendChild(item);
      });
      document.getElementById('refunds-section').style.display = 'block';
    }

    document.getElementById('receipt-content').style.display = 'block';
  }

  function copyLink() {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(window.location.href)
        .then(() => alert('Link copied!'))
        .catch(() => prompt('Copy this link:', window.location.href));
      return;
    }
    prompt('Copy this link:', window.location.href);
  }

  // ── Bootstrap ──────────────────────────────────────────────────────────────

  (async () => {
    const orderId = getOrderId();
    if (!orderId) {
      document.getElementById('missing-id').textContent = '(none)';
      document.getElementById('not-found').style.display = 'block';
      return;
    }

    document.title = `Receipt ${orderId} – LumenFlow`;
    document.getElementById('loading').style.display = 'block';

    const data = await fetchPayment(orderId);

    document.getElementById('loading').style.display = 'none';

    if (!data) {
      document.getElementById('missing-id').textContent = orderId;
      document.getElementById('not-found').style.display = 'block';
    } else {
      renderReceipt(data);
    }
  })();
</script>
</body>
</html>
