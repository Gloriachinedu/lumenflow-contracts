<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment History – LumenFlow</title>
  <meta name="description" content="View and filter your complete LumenFlow payment history, sorted and paginated for easy browsing." />
  <meta property="og:title" content="Payment History – LumenFlow" />
  <meta property="og:description" content="View and filter your complete LumenFlow payment history, sorted and paginated for easy browsing." />
  <meta name="twitter:card" content="summary" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #6c47ff;
    }

    /* ── Filter Panel ────────────────────────────────────────────────────────── */
    .filter-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .filter-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
    }

    .filter-group input, .filter-group select {
      padding: 0.6rem;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-group input:focus, .filter-group select:focus {
      border-color: #6c47ff;
    }

    .range-inputs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .range-inputs input { width: 100%; }

    /* ── Active Filters (Chips) ──────────────────────────────────────────────── */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #f0f0f0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      background: #f0ecff;
      color: #6c47ff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      gap: 0.4rem;
    }

    .chip button {
      background: none;
      border: none;
      color: #6c47ff;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0.2rem;
      display: flex;
      align-items: center;
    }

    .chip button:hover { color: #5032d1; }

    /* ── Results Table ────────────────────────────────────────────────────────── */
    .results-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: #fafbfc;
      padding: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      border-bottom: 1px solid #eee;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid #f9f9f9;
      font-size: 0.9rem;
    }

    tr:last-child td { border-bottom: none; }

    /* ── Mobile Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 767px) {
      body { padding: 1rem 0.5rem; }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .range-inputs {
        flex-wrap: wrap;
      }
      .range-inputs input { width: calc(50% - 1rem); }

      /* Hide table, show card layout instead */
      .results-card { overflow-x: hidden; }

      table thead { display: none; }

      table, tbody, tr, td {
        display: block;
        width: 100%;
      }

      tr {
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        padding: 0.75rem;
        background: #fff;
      }
      tr:last-child { margin-bottom: 0; }

      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0;
        border-bottom: none;
        font-size: 0.85rem;
      }

      td::before {
        content: attr(data-label);
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        flex-shrink: 0;
        margin-right: 0.5rem;
      }
    }

    .amount-cell { font-weight: 600; color: #1a1a2e; }
    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .status-completed          { background: #e6f9f0; color: #1a9e5c; }
    .status-partiallyrefunded  { background: #fff3e0; color: #e07b00; }
    .status-fullyrefunded      { background: #fce8e8; color: #c0392b; }
    .status-unknown            { background: #f0f0f0; color: #666; }

    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: #888;
    }

    /* ── Accessibility ────────────────────────────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 2px solid #6c47ff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Payment History</h1>
  </header>

  <section class="filter-panel" aria-labelledby="filter-heading">
    <h2 id="filter-heading" class="sr-only">Filters</h2>
    
    <div class="filter-grid">
      <!-- Merchant Address -->
      <div class="filter-group" style="grid-column: 1 / -1;">
        <label for="merchant-address">Merchant Address</label>
        <input type="text" id="merchant-address" placeholder="G… your Stellar address" autocomplete="off">
      </div>

      <!-- Date Range -->
      <div class="filter-group">
        <label for="date-start">Date Range</label>
        <div class="range-inputs">
          <input type="date" id="date-start" aria-label="Start Date">
          <span>to</span>
          <input type="date" id="date-end" aria-label="End Date">
        </div>
      </div>

      <!-- Amount Range -->
      <div class="filter-group">
        <label for="amount-min">Amount Range (XLM)</label>
        <div class="range-inputs">
          <input type="number" id="amount-min" placeholder="Min" min="0" step="0.1">
          <span>to</span>
          <input type="number" id="amount-max" placeholder="Max" min="0" step="0.1">
        </div>
      </div>

      <!-- Token -->
      <div class="filter-group">
        <label for="token-selector">Token</label>
        <select id="token-selector">
          <option value="">All Tokens</option>
          <option value="native">Native (XLM)</option>
          <option value="USDC">USDC</option>
        </select>
      </div>

      <!-- Status -->
      <div class="filter-group">
        <label for="status-selector">Status</label>
        <select id="status-selector">
          <option value="Any">Any Status</option>
          <option value="Completed">Completed</option>
          <option value="PartiallyRefunded">Partially Refunded</option>
          <option value="FullyRefunded">Fully Refunded</option>
        </select>
      </div>

      <!-- Currency display toggle -->
      <div class="filter-group">
        <label for="currency-display-toggle">Display Amounts As</label>
        <select id="currency-display-toggle" aria-label="Currency display format">
          <option value="native">Native Token</option>
          <option value="xlm">XLM Equivalent</option>
        </select>
      </div>
    </div>

    <div id="active-filters" class="active-filters" aria-live="polite">
      <!-- Chips will be rendered here -->
    </div>
  </section>

  <div class="results-card">
    <!-- Loading state -->
    <div id="loading-state" style="display:none;padding:3rem;text-align:center;color:#888;" role="status" aria-live="polite">
      ⏳ Loading payments…
    </div>

    <!-- Error state -->
    <div id="error-state" style="display:none;padding:3rem;text-align:center;color:#c0392b;" role="alert" aria-live="assertive">
      <div style="font-size:1.5rem;margin-bottom:0.5rem">⚠</div>
      <strong id="error-msg">Failed to load payments.</strong>
      <div style="margin-top:0.75rem">
        <button onclick="retryFetch()" style="padding:0.4rem 1rem;border:1.5px solid #c0392b;border-radius:6px;background:#fff;color:#c0392b;font-weight:600;cursor:pointer">Retry</button>
      </div>
    </div>

    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Order ID</th>
          <th>Recipient</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <!-- Rows will be rendered here -->
      </tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      No payments found matching your filters.
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const CONTRACT_ID = window.LUMENFLOW_CONTRACT_ID || '';
  const RPC_URL     = window.LUMENFLOW_RPC_URL     || 'https://soroban-testnet.stellar.org';
  const DEMO_MODE   = !CONTRACT_ID;

  // ── State Management ────────────────────────────────────────────────────────

  const filters = {
    merchant_address: '',
    date_start: '',
    date_end: '',
    amount_min: '',
    amount_max: '',
    token: '',
    status: 'Any'
  };

  // ── Initialize from URL ─────────────────────────────────────────────────────

  function initFromUrl() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('merchant_address')) {
      filters.merchant_address = params.get('merchant_address');
      document.getElementById('merchant-address').value = filters.merchant_address;
    }
    if (params.has('date_start')) { filters.date_start = params.get('date_start'); document.getElementById('date-start').value = filters.date_start; }
    if (params.has('date_end'))   { filters.date_end   = params.get('date_end');   document.getElementById('date-end').value   = filters.date_end; }
    if (params.has('amount_min')) { filters.amount_min = params.get('amount_min'); document.getElementById('amount-min').value = filters.amount_min; }
    if (params.has('amount_max')) { filters.amount_max = params.get('amount_max'); document.getElementById('amount-max').value = filters.amount_max; }
    if (params.has('token'))      { filters.token  = params.get('token');  document.getElementById('token-selector').value  = filters.token; }
    if (params.has('status'))     { filters.status = params.get('status'); document.getElementById('status-selector').value = filters.status; }
    renderActiveFilters();
    updateResults();
  }

  function updateUrl() {
    const params = new URLSearchParams();
    for (const key in filters) {
      if (filters[key] && filters[key] !== 'Any') params.set(key, filters[key]);
    }
    const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
    window.history.pushState({}, '', newUrl);
  }

  // ── Render Helpers ──────────────────────────────────────────────────────────

  function renderActiveFilters() {
    const container = document.getElementById('active-filters');
    container.innerHTML = '';
    const labels = { merchant_address: 'Merchant: ', date_start: 'From ', date_end: 'To ', amount_min: 'Min ', amount_max: 'Max ', token: 'Token: ', status: 'Status: ' };
    for (const key in filters) {
      const val = filters[key];
      if (val && val !== 'Any') {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `<span>${labels[key]}${val}</span><button onclick="removeFilter('${key}')" aria-label="Remove filter ${labels[key]}${val}">&times;</button>`;
        container.appendChild(chip);
      }
    }
  }

  function removeFilter(key) {
    filters[key] = key === 'status' ? 'Any' : '';
    const idMap = { merchant_address: 'merchant-address', date_start: 'date-start', date_end: 'date-end', amount_min: 'amount-min', amount_max: 'amount-max', token: 'token-selector', status: 'status-selector' };
    const el = document.getElementById(idMap[key]);
    if (el) el.value = filters[key];
    updateUrl();
    renderActiveFilters();
    updateResults();
  }

  // ── Status badge ────────────────────────────────────────────────────────────
  const STATUS_MAP = {
    Completed:         { label: '✔ Completed',          cls: 'status-completed'         },
    PartiallyRefunded: { label: '↩ Partially Refunded', cls: 'status-partiallyrefunded' },
    FullyRefunded:     { label: '↩ Fully Refunded',     cls: 'status-fullyrefunded'     },
  };
  function statusBadgeHtml(status) {
    const entry = STATUS_MAP[status] || { label: status || 'Unknown', cls: 'status-unknown' };
    return `<span class="status-badge ${entry.cls}">${entry.label}</span>`;
  }

  // ── Formatting ──────────────────────────────────────────────────────────────
  const TOKEN_METADATA = {
    native: { symbol: 'XLM', decimals: 7, name: 'Stellar Lumens' },
    CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC: { symbol: 'USDC', decimals: 6, name: 'USD Coin' },
    CCW67TSZV3SSS2HXMBQ5JFGCKJNXKZM7UQUWUZPUTHXSTZLEO7SJMI75: { symbol: 'USDC', decimals: 6, name: 'USD Coin' },
  };
  const FALLBACK_METADATA = { symbol: 'TOKEN', decimals: 7, name: 'Unknown Token' };
  function getTokenMetadata(tokenId) {
    if (!tokenId) return FALLBACK_METADATA;
    return TOKEN_METADATA[tokenId] || FALLBACK_METADATA;
  }
  const XLM_RATES = { XLM: 1, USDC: 8, TOKEN: 1 };
  function formatTokenAmount(amount, tokenId) {
    const { symbol, decimals } = getTokenMetadata(tokenId);
    const value = Number(amount) / Math.pow(10, decimals);
    const formatted = value.toLocaleString(undefined, {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals,
    });
    return `${formatted} ${symbol}`;
  }
  function convertToXlm(amount, tokenId) {
    const { symbol, decimals } = getTokenMetadata(tokenId);
    const humanAmount = Number(amount) / Math.pow(10, decimals);
    const rate = XLM_RATES[symbol] ?? 1;
    const xlmAmount = humanAmount * rate;
    const formatted = xlmAmount.toLocaleString(undefined, {
      minimumFractionDigits: 7,
      maximumFractionDigits: 7,
    });
    return `${formatted} XLM`;
  }
  function formatAmount(amount) {
    return (Number(amount) / 1e7).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 7 }) + ' XLM';
  }
  function formatDate(ts) { return new Date(Number(ts) * 1000).toLocaleString(); }

  // ── Mock data (demo mode) ───────────────────────────────────────────────────
  const MOCK_DATA = [
    { paid_at: BigInt(Math.floor(Date.now()/1000) - 86400), order_id: 'ORD-9921', merchant_address: 'GBXGQJWVLWOYHFLVTKWV5FGHA3LNYY2JQKM7OAJAUEQFU6LPCSEFVXON', amount: BigInt(1245000000), status: 'Completed'         },
    { paid_at: BigInt(Math.floor(Date.now()/1000) - 172800), order_id: 'ORD-8832', merchant_address: 'GBXGQJWVLWOYHFLVTKWV5FGHA3LNYY2JQKM7OAJAUEQFU6LPCSEFVXON', amount: BigInt(120000000),  status: 'Completed'         },
    { paid_at: BigInt(Math.floor(Date.now()/1000) - 259200), order_id: 'ORD-7712', merchant_address: 'GBXGQJWVLWOYHFLVTKWV5FGHA3LNYY2JQKM7OAJAUEQFU6LPCSEFVXON', amount: BigInt(159900000),  status: 'PartiallyRefunded' },
    { paid_at: BigInt(Math.floor(Date.now()/1000) - 604800), order_id: 'ORD-6601', merchant_address: 'GBXGQJWVLWOYHFLVTKWV5FGHA3LNYY2JQKM7OAJAUEQFU6LPCSEFVXON', amount: BigInt(99900000),   status: 'FullyRefunded'     },
  ];

  // ── Soroban fetch ───────────────────────────────────────────────────────────
  async function fetchFromContract(merchantAddress) {
    const { SorobanRpc, Contract, nativeToScVal, scValToNative } =
      await import('https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@12/+esm');
    const server   = new SorobanRpc.Server(RPC_URL);
    const contract = new Contract(CONTRACT_ID);

    const filterArg = buildFilterArg(nativeToScVal);

    const result = await server.simulateTransaction(
      contract.call(
        'get_merchant_payment_history',
        nativeToScVal(merchantAddress, { type: 'address' }),
        nativeToScVal(null),           // cursor
        nativeToScVal(50, { type: 'u32' }), // limit
        filterArg,
        nativeToScVal('Date',       { type: 'symbol' }),
        nativeToScVal('Descending', { type: 'symbol' }),
      )
    );
    if (SorobanRpc.Api.isSimulationError(result)) {
      throw new Error(result.error || 'Contract call failed');
    }
    const page = scValToNative(result.result.retval);
    return page.payments || [];
  }

  function buildFilterArg(nativeToScVal) {
    const hasFilter = filters.date_start || filters.date_end || filters.amount_min || filters.amount_max || filters.token || filters.status !== 'Any';
    if (!hasFilter) return nativeToScVal(null);
    return nativeToScVal({
      date_start:  filters.date_start  ? BigInt(new Date(filters.date_start).getTime() / 1000)  : null,
      date_end:    filters.date_end    ? BigInt(new Date(filters.date_end).getTime()   / 1000)  : null,
      amount_min:  filters.amount_min  ? BigInt(Math.round(Number(filters.amount_min) * 1e7))  : null,
      amount_max:  filters.amount_max  ? BigInt(Math.round(Number(filters.amount_max) * 1e7))  : null,
      token:       filters.token       || null,
      status:      filters.status !== 'Any' ? filters.status : null,
    });
  }

  // ── UI state helpers ────────────────────────────────────────────────────────
  function showLoading() {
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('error-state').style.display   = 'none';
    document.getElementById('history-table').style.display = 'none';
    document.getElementById('empty-state').style.display   = 'none';
  }
  function showError(msg) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display   = 'block';
    document.getElementById('error-msg').textContent       = msg;
    document.getElementById('history-table').style.display = 'none';
    document.getElementById('empty-state').style.display   = 'none';
  }
  function showTable() {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display   = 'none';
    document.getElementById('history-table').style.display = '';
  }

  // ── Render rows ─────────────────────────────────────────────────────────────
  function renderRows(payments) {
    const body  = document.getElementById('history-body');
    const empty = document.getElementById('empty-state');
    body.innerHTML = '';
    if (!payments.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    const currencyMode = document.getElementById('currency-display-toggle')
      ? document.getElementById('currency-display-toggle').value
      : 'native';
    payments.forEach(p => {
      const amountDisplay = currencyMode === 'xlm'
        ? convertToXlm(p.amount, p.token)
        : formatTokenAmount(p.amount, p.token);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="Date">${formatDate(p.paid_at)}</td>
        <td data-label="Order ID"><code>${p.order_id}</code></td>
        <td data-label="Merchant"><code title="${p.merchant_address}">${p.merchant_address.slice(0,8)}…</code></td>
        <td data-label="Amount" class="amount-cell">${amountDisplay}</td>
        <td data-label="Status">${statusBadgeHtml(p.status)}</td>`;
      body.appendChild(tr);
    });
  }

  // ── Main update ─────────────────────────────────────────────────────────────
  async function updateResults() {
    if (DEMO_MODE) {
      showTable();
      renderRows(MOCK_DATA);
      return;
    }

    const merchant = filters.merchant_address.trim();
    if (!merchant) {
      showTable();
      renderRows([]);
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('empty-state').textContent   = 'Enter a merchant address to load payment history.';
      return;
    }

    showLoading();
    try {
      const payments = await fetchFromContract(merchant);
      showTable();
      renderRows(payments);
    } catch (e) {
      showError(e.message || 'Failed to fetch payment history from contract.');
    }
  }

  function retryFetch() { updateResults(); }

  // ── Event Listeners ─────────────────────────────────────────────────────────
  const inputBindings = [
    { id: 'merchant-address', key: 'merchant_address' },
    { id: 'date-start',       key: 'date_start'       },
    { id: 'date-end',         key: 'date_end'         },
    { id: 'amount-min',       key: 'amount_min'       },
    { id: 'amount-max',       key: 'amount_max'       },
    { id: 'token-selector',   key: 'token'            },
    { id: 'status-selector',  key: 'status'           },
  ];
  inputBindings.forEach(({ id, key }) => {
    document.getElementById(id).addEventListener('change', e => {
      filters[key] = e.target.value;
      updateUrl();
      renderActiveFilters();
      updateResults();
    });
  });

  window.removeFilter = removeFilter;
  window.retryFetch   = retryFetch;
  window.addEventListener('popstate', initFromUrl);
  renderModeBanner();

  // ── Currency display toggle ─────────────────────────────────────────────────
  const currencyToggleEl = document.getElementById('currency-display-toggle');
  if (currencyToggleEl) {
    currencyToggleEl.addEventListener('change', () => updateResults());
  }

  initFromUrl();
</script>

</body>
</html>
