<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment History – LumenFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #6c47ff;
    }

    /* ── Filter Panel ────────────────────────────────────────────────────────── */
    .filter-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .filter-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
    }

    .filter-group input, .filter-group select {
      padding: 0.6rem;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-group input:focus, .filter-group select:focus {
      border-color: #6c47ff;
    }

    .range-inputs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .range-inputs input { width: 100%; }

    /* ── Active Filters (Chips) ──────────────────────────────────────────────── */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #f0f0f0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      background: #f0ecff;
      color: #6c47ff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      gap: 0.4rem;
    }

    .chip button {
      background: none;
      border: none;
      color: #6c47ff;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0.2rem;
      display: flex;
      align-items: center;
    }

    .chip button:hover { color: #5032d1; }

    /* ── Results Table ────────────────────────────────────────────────────────── */
    .results-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: #fafbfc;
      padding: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      border-bottom: 1px solid #eee;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid #f9f9f9;
      font-size: 0.9rem;
    }

    tr:last-child td { border-bottom: none; }

    .amount-cell { font-weight: 600; color: #1a1a2e; }
    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .status-completed { background: #e6f9f0; color: #1a9e5c; }
    .status-refunded  { background: #fff3e0; color: #e07b00; }

    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: #888;
    }

    /* ── Accessibility ────────────────────────────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 2px solid #6c47ff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Payment History</h1>
  </header>

  <section class="filter-panel" aria-labelledby="filter-heading">
    <h2 id="filter-heading" class="sr-only">Filters</h2>
    
    <div class="filter-grid">
      <!-- Date Range -->
      <div class="filter-group">
        <label for="date-start">Date Range</label>
        <div class="range-inputs">
          <input type="date" id="date-start" aria-label="Start Date">
          <span>to</span>
          <input type="date" id="date-end" aria-label="End Date">
        </div>
      </div>

      <!-- Amount Range -->
      <div class="filter-group">
        <label for="amount-min">Amount Range (XLM)</label>
        <div class="range-inputs">
          <input type="number" id="amount-min" placeholder="Min" min="0" step="0.1">
          <span>to</span>
          <input type="number" id="amount-max" placeholder="Max" min="0" step="0.1">
        </div>
      </div>

      <!-- Token -->
      <div class="filter-group">
        <label for="token-selector">Token</label>
        <select id="token-selector">
          <option value="">All Tokens</option>
          <option value="native">Native (XLM)</option>
          <option value="USDC">USDC</option>
        </select>
      </div>

      <!-- Status -->
      <div class="filter-group">
        <label for="status-selector">Status</label>
        <select id="status-selector">
          <option value="Any">Any Status</option>
          <option value="Completed">Completed</option>
          <option value="PartiallyRefunded">Partially Refunded</option>
          <option value="FullyRefunded">Fully Refunded</option>
        </select>
      </div>
    </div>

    <div id="active-filters" class="active-filters" aria-live="polite">
      <!-- Chips will be rendered here -->
    </div>
  </section>

  <div class="results-card">
    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Order ID</th>
          <th>Recipient</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <!-- Rows will be rendered here -->
      </tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      No payments found matching your filters.
    </div>
  </div>
</div>

<script>
  // ── State Management ────────────────────────────────────────────────────────
  
  const filters = {
    date_start: '',
    date_end: '',
    amount_min: '',
    amount_max: '',
    token: '',
    status: 'Any'
  };

  // ── Initialize from URL ─────────────────────────────────────────────────────
  
  function initFromUrl() {
    const params = new URLSearchParams(window.location.search);
    for (const key in filters) {
      if (params.has(key)) {
        filters[key] = params.get(key);
        const el = document.getElementById(key.replace('_', '-').replace('selector', 'selector'));
        if (el) el.value = filters[key];
      }
    }
    // Specific ID fixes for range inputs
    if (params.has('date_start')) document.getElementById('date-start').value = params.get('date_start');
    if (params.has('date_end'))   document.getElementById('date-end').value   = params.get('date_end');
    if (params.has('amount_min')) document.getElementById('amount-min').value = params.get('amount_min');
    if (params.has('amount_max')) document.getElementById('amount-max').value = params.get('amount_max');
    if (params.has('token'))      document.getElementById('token-selector').value = params.get('token');
    if (params.has('status'))     document.getElementById('status-selector').value = params.get('status');

    renderActiveFilters();
    updateResults();
  }

  function updateUrl() {
    const params = new URLSearchParams();
    for (const key in filters) {
      if (filters[key] && filters[key] !== 'Any') {
        params.set(key, filters[key]);
      }
    }
    const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
    window.history.pushState({}, '', newUrl);
  }

  // ── Render Helpers ──────────────────────────────────────────────────────────

  function renderActiveFilters() {
    const container = document.getElementById('active-filters');
    container.innerHTML = '';

    const labels = {
      date_start: 'From ',
      date_end: 'To ',
      amount_min: 'Min ',
      amount_max: 'Max ',
      token: 'Token: ',
      status: 'Status: '
    };

    for (const key in filters) {
      const val = filters[key];
      if (val && val !== 'Any') {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `
          <span>${labels[key]}${val}</span>
          <button onclick="removeFilter('${key}')" aria-label="Remove filter ${labels[key]}${val}">&times;</button>
        `;
        container.appendChild(chip);
      }
    }
  }

  function removeFilter(key) {
    filters[key] = key === 'status' ? 'Any' : '';
    const id = key.replace('_', '-');
    const el = document.getElementById(id) || document.getElementById(id + '-selector');
    if (el) el.value = filters[key];
    
    updateUrl();
    renderActiveFilters();
    updateResults();
  }

  // ── Mock Results ────────────────────────────────────────────────────────────
  
  const mockData = [
    { date: '2026-05-28 14:22', id: 'ORD-9921', recipient: 'Amazon', amount: '124.50 XLM', status: 'Completed' },
    { date: '2026-05-27 09:15', id: 'ORD-8832', recipient: 'Starbucks', amount: '12.00 XLM', status: 'Completed' },
    { date: '2026-05-25 18:40', id: 'ORD-7712', recipient: 'Netflix', amount: '15.99 XLM', status: 'PartiallyRefunded' },
  ];

  function updateResults() {
    const body = document.getElementById('history-body');
    const empty = document.getElementById('empty-state');
    
    // In a real app, we would fetch from Soroban here using the filters.
    // For this UI component, we'll just show the mock data.
    
    body.innerHTML = '';
    if (mockData.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      mockData.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.date}</td>
          <td><code>${item.id}</code></td>
          <td>${item.recipient}</td>
          <td class="amount-cell">${item.amount}</td>
          <td><span class="status-badge ${item.status === 'Completed' ? 'status-completed' : 'status-refunded'}">${item.status}</span></td>
        `;
        body.appendChild(tr);
      });
    }
  }

  // ── Event Listeners ─────────────────────────────────────────────────────────

  const inputs = [
    { id: 'date-start', key: 'date_start' },
    { id: 'date-end', key: 'date_end' },
    { id: 'amount-min', key: 'amount_min' },
    { id: 'amount-max', key: 'amount_max' },
    { id: 'token-selector', key: 'token' },
    { id: 'status-selector', key: 'status' }
  ];

  inputs.forEach(({ id, key }) => {
    document.getElementById(id).addEventListener('change', (e) => {
      filters[key] = e.target.value;
      updateUrl();
      renderActiveFilters();
      updateResults();
    });
  });

  // Init
  window.addEventListener('popstate', initFromUrl);
  initFromUrl();

</script>

</body>
</html>
