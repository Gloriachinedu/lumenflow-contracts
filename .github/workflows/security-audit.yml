name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Cargo Audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: 1.87.0

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --config audit.toml

      - name: Upload cargo-audit report
        if: always()
        run: cargo audit --config audit.toml --json > cargo-audit-report.json 2>&1 || true

      - name: Upload cargo audit report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae6567c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cargo-audit-report
          path: cargo-audit-report.json
          retention-days: 30

  npm-audit:
    name: npm Audit (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # ----- Root package (Playwright e2e tests) -----
      - name: Audit root dependencies
        id: root-audit
        run: |
          npm audit --audit-level=high --json > root-npm-audit.json 2>&1 || true
          npm audit --audit-level=high
        continue-on-error: false

      # ----- SDK package -----
      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci --ignore-scripts

      - name: Audit SDK dependencies
        id: sdk-audit
        working-directory: sdk
        run: |
          npm audit --audit-level=high --json > ../sdk-npm-audit.json 2>&1 || true
          npm audit --audit-level=high

      # ----- Frontend package -----
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Audit frontend dependencies
        id: frontend-audit
        working-directory: frontend
        run: |
          npm audit --audit-level=high --json > ../frontend-npm-audit.json 2>&1 || true
          npm audit --audit-level=high

      - name: Upload npm audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae6567c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: npm-audit-reports
          path: |
            root-npm-audit.json
            sdk-npm-audit.json
            frontend-npm-audit.json
          retention-days: 30
