name: Release

# Triggered when a semver tag (e.g. v1.2.3, v1.2.3-rc.1) is pushed.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Tag & Version Alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      # Ensure the pushed tag matches the version in contracts/lumenflow/Cargo.toml
      - name: Check contract version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading "v"
          CARGO_VER=$(grep '^version' contracts/lumenflow/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "Tag version  : $TAG"
          echo "Cargo version: $CARGO_VER"
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "ERROR: tag v$TAG does not match Cargo.toml version $CARGO_VER" >&2
            exit 1
          fi

      # Ensure the pushed tag matches the version in sdk/package.json
      - name: Check SDK version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SDK_VER=$(node -p "require('./sdk/package.json').version")
          echo "Tag version: $TAG"
          echo "SDK version: $SDK_VER"
          if [ "$TAG" != "$SDK_VER" ]; then
            echo "ERROR: tag v$TAG does not match sdk/package.json version $SDK_VER" >&2
            exit 1
          fi

  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' contracts/lumenflow/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Build WASM (release)
        run: |
          cargo build --locked \
            --target wasm32-unknown-unknown \
            --release \
            --package lumenflow

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v22.8.1/stellar-cli-22.8.1-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar

      - name: Verify WASM artifact
        run: |
          WASM=target/wasm32-unknown-unknown/release/lumenflow.wasm

          # Non-zero size check
          SIZE=$(wc -c < "$WASM")
          if [ "$SIZE" -eq 0 ]; then
            echo "::error::WASM artifact is empty"
            exit 1
          fi
          echo "WASM size: ${SIZE} bytes"

          # Soroban 128 KB limit (131072 bytes); CI threshold is 100 KB
          if [ "$SIZE" -gt 102400 ]; then
            echo "::error::WASM size ${SIZE} exceeds 100 KB CI threshold"
            exit 1
          fi

          # Validate contract and log exported functions
          echo "### WASM Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "Size: ${SIZE} bytes" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Exported functions" >> "$GITHUB_STEP_SUMMARY"
          stellar contract inspect --wasm "$WASM" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Rename artifact
        run: |
          cp target/wasm32-unknown-unknown/release/lumenflow.wasm \
             lumenflow_${{ github.ref_name }}.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: lumenflow_${{ github.ref_name }}.wasm
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
