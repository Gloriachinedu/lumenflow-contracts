name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Reproducibility check
        run: cargo update --locked

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --locked --all-features

  auth-tests:
    name: Auth Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run auth tests
        run: cargo test --all-features auth

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM
        run: |
          cargo build --locked \
            --target wasm32-unknown-unknown \
            --release \
            --package lumenflow

      - name: Check WASM size
        run: |
          WASM=target/wasm32-unknown-unknown/release/lumenflow.wasm
          SIZE=$(wc -c < "$WASM")
          LIMIT=$((100 * 1024))
          SIZE_KB=$(echo "scale=2; $SIZE / 1024" | bc)
          LIMIT_KB=100

          echo "WASM size: ${SIZE} bytes (${SIZE_KB} KB) — limit: ${LIMIT} bytes (${LIMIT_KB} KB)"

          # Write a step summary so the size is visible in the Actions UI
          {
            echo "### WASM Size Report"
            echo "| | Value |"
            echo "|---|---|"
            echo "| Binary | \`lumenflow.wasm\` |"
            echo "| Size | ${SIZE_KB} KB (${SIZE} bytes) |"
            echo "| Limit | ${LIMIT_KB} KB (${LIMIT} bytes) |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "| Status | ❌ EXCEEDS LIMIT |" >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "ERROR: WASM binary is ${SIZE_KB} KB, which exceeds the 100 KB limit."
            echo "To reduce size: run 'cargo build --release' with 'opt-level = \"z\"' in Cargo.toml,"
            echo "or remove unused features. See README for details."
            exit 1
          else
            echo "| Status | ✅ Within limit |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lumenflow-wasm
          path: target/wasm32-unknown-unknown/release/lumenflow.wasm
          retention-days: 30
