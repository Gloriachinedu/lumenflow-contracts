name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target/cargo-lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Reproducibility check
        run: cargo update --locked

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Check documentation
        run: cargo doc --no-deps --locked 2>&1 | (! grep "^warning")

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target/cargo-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --locked --all-features

  auth-tests:
    name: Auth Tests
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target/cargo-auth
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-auth-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-auth-
            ${{ runner.os }}-cargo-

      - name: Run auth tests
        run: cargo test --all-features auth

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install lint dependencies
        run: npm ci

      - name: Lint HTML (npm script)
        run: npm run lint:html

      - name: Lint JS (ESLint)
        run: npm run lint:js

      - name: Lint HTML files (htmlhint direct)
        run: npx --yes htmlhint "frontend/**/*.html" --config .htmlhintrc

      - name: Lint CSS files (stylelint)
        run: npx --yes stylelint "frontend/**/*.css" --config '{"rules":{"block-no-empty":true,"color-no-invalid-hex":true,"no-duplicate-selectors":true}}'

  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.87.0

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Cache Cargo registry and git sources
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cli-

      - name: Run CLI unit and integration tests
        run: cargo test --package lumenflow-cli --all-features

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      CARGO_TARGET_DIR: target/cargo-wasm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Verify toolchain version
        run: rustc --version | grep "1.87.0"

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Build WASM
        run: |
          cargo build --locked \
            --target wasm32-unknown-unknown \
            --release \
            --package lumenflow

      - name: Check WASM size
        run: |
          WASM=target/cargo-wasm/wasm32-unknown-unknown/release/lumenflow.wasm
          SIZE=$(wc -c < "$WASM")
          LIMIT=$((100 * 1024))
          echo "WASM size: ${SIZE} bytes (limit: ${LIMIT})"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "| Status | ❌ EXCEEDS LIMIT |" >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "ERROR: WASM binary is ${SIZE_KB} KB, which exceeds the 100 KB limit."
            echo "To reduce size: run 'cargo build --release' with 'opt-level = \"z\"' in Cargo.toml,"
            echo "or remove unused features. See README for details."
            exit 1
          else
            echo "| Status | ✅ Within limit |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae6567c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lumenflow-wasm
          path: target/cargo-wasm/wasm32-unknown-unknown/release/lumenflow.wasm
          retention-days: 30

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Build SDK
        working-directory: sdk
        run: npm run build --if-present

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: 1.87.0

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --config audit.toml

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Audit root dependencies (Playwright)
        # --audit-level=high fails the job on high or critical vulnerabilities
        run: npm audit --audit-level=high --omit=dev || npm audit --audit-level=high
        continue-on-error: false

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci --ignore-scripts

      - name: Audit SDK dependencies
        working-directory: sdk
        run: npm audit --audit-level=high --omit=dev || npm audit --audit-level=high

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev || npm audit --audit-level=high
