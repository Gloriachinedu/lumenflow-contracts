name: Testnet Smoke Test

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target Stellar network"
        required: false
        default: "testnet"

# Prevent concurrent smoke tests against the same network
concurrency:
  group: smoke-${{ github.event.inputs.network || 'testnet' }}
  cancel-in-progress: false

jobs:
  deploy-and-smoke:
    name: Deploy & Smoke Test
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.87.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-smoke-

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release --package lumenflow

      - name: Install Stellar CLI
        run: |
          cargo install stellar-cli --locked --version 22.8.1

      - name: Deploy contract to testnet
        id: deploy
        env:
          SOURCE_ACCOUNT: ${{ secrets.TESTNET_ADMIN_KEY }}
          NETWORK: ${{ github.event.inputs.network || 'testnet' }}
        run: |
          CONTRACT_ID=$(NETWORK="$NETWORK" SOURCE_ACCOUNT="$SOURCE_ACCOUNT" ./scripts/deploy.sh \
            | grep "Contract ID" | awk '{print $NF}')
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"

      - name: Run smoke test
        env:
          CONTRACT_ID: ${{ steps.deploy.outputs.contract_id }}
          NETWORK: ${{ github.event.inputs.network || 'testnet' }}
          ADMIN_KEY: ${{ secrets.TESTNET_ADMIN_KEY }}
          MERCHANT_KEY: ${{ secrets.TESTNET_MERCHANT_KEY }}
          PAYER_KEY: ${{ secrets.TESTNET_PAYER_KEY }}
          TOKEN_ADDRESS: ${{ secrets.TESTNET_TOKEN_ADDRESS }}
          ADMIN_ADDRESS: ${{ secrets.TESTNET_ADMIN_ADDRESS }}
          MERCHANT_ADDRESS: ${{ secrets.TESTNET_MERCHANT_ADDRESS }}
          PAYER_ADDRESS: ${{ secrets.TESTNET_PAYER_ADDRESS }}
        run: ./scripts/smoke_test.sh
