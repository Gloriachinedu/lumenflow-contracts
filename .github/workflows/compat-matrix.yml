name: Compatibility Matrix

# Validates contract and SDK against multiple Rust toolchain / npm package versions.
# Runs on PRs and weekly to catch upstream regressions early.
on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust toolchain matrix ──────────────────────────────────────────────────
  rust-matrix:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust:
          - "1.87.0"   # pinned (current stable, matches rust-toolchain.toml)
          - "1.86.0"   # previous patch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # master
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Run tests
        run: cargo test --all-features

      - name: Build WASM
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --release \
            --package lumenflow

  # ── SDK npm package version matrix ────────────────────────────────────────
  sdk-matrix:
    name: SDK – Node ${{ matrix.node }} / tweetnacl ${{ matrix.tweetnacl }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: "20"
            tweetnacl: "1.0.3"   # pinned version (production)
          - node: "22"
            tweetnacl: "1.0.3"   # latest LTS with pinned dep
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56745cba8c7296529d2fc39830  # v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Override tweetnacl version
        if: ${{ matrix.tweetnacl != '' }}
        run: npm install tweetnacl@${{ matrix.tweetnacl }} --save-exact

      - name: Build SDK
        run: npm run build

      - name: Run SDK tests
        run: npm test
